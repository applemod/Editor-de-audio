<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Audio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .canvas-container {
            background: #1e293b;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        #waveformCanvas {
            width: 100%;
            height: 250px;
            cursor: crosshair;
        }
        .slider-custom {
            accent-color: #3b82f6;
        }
        #selectionOverlay {
            position: absolute;
            top: 0;
            height: 100%;
            background: rgba(59, 130, 246, 0.3);
            pointer-events: none;
            display: none;
        }
        .modal-bg {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }
        .recording-pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-light tracking-tight">Editor De Audio</h1>
                <p class="text-slate-400 text-sm">Procesamiento De Señal Avanzado (Stereo Support)</p>
            </div>
            <div class="flex gap-3">
                <button id="recordBtn" onclick="toggleRecording()" class="bg-red-600 hover:bg-red-500 px-6 py-2 rounded-full text-sm font-medium transition-all flex items-center gap-2">
                    <span id="recordDot" class="w-3 h-3 bg-white rounded-full"></span>
                    <span id="recordText">Grabar</span>
                </button>
                <input type="file" id="audioInput" accept="audio/*" class="hidden">
                <button onclick="document.getElementById('audioInput').click()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full text-sm font-medium transition-colors">
                    Cargar Archivo
                </button>
                <button id="exportBtn" disabled onclick="exportAudio()" class="bg-emerald-600 disabled:opacity-30 px-6 py-2 rounded-full text-sm font-medium">
                    Exportar
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="canvas-container shadow-2xl border border-slate-700">
                    <canvas id="waveformCanvas"></canvas>
                    <div id="selectionOverlay"></div>
                    <div id="playbackCursor" class="absolute top-0 left-0 w-0.5 h-full bg-red-500 pointer-events-none"></div>
                </div>

                <div class="flex flex-wrap items-center justify-center gap-6 bg-slate-800/50 p-4 rounded-xl">
                    <div class="flex gap-2 border-r border-slate-700 pr-6">
                        <button id="undoBtn" onclick="undo()" disabled title="Deshacer" class="p-2 rounded bg-slate-700 hover:bg-slate-600 disabled:opacity-30">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l5-5m-5 5l5 5"/></svg>
                        </button>
                        <button id="redoBtn" onclick="redo()" disabled title="Rehacer" class="p-2 rounded bg-slate-700 hover:bg-slate-600 disabled:opacity-30">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 10h-10a8 8 0 00-8 8v2m18-10l-5-5m5 5l-5 5"/></svg>
                        </button>
                    </div>

                    <button id="playPauseBtn" disabled onclick="togglePlayback()" class="p-3 rounded-full bg-slate-700 hover:bg-slate-600 disabled:opacity-50">
                        <svg id="playIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="pauseIcon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    
                    <div class="flex flex-col items-center gap-1 min-w-[100px]">
                        <span id="currentTime" class="text-xs font-mono">0.0s</span>
                        <div class="h-1 w-full bg-slate-700 rounded-full overflow-hidden">
                            <div id="progressFill" class="h-full bg-blue-500 w-0"></div>
                        </div>
                        <span id="totalTime" class="text-xs font-mono text-slate-500">0.0s</span>
                    </div>

                    <div class="flex items-center gap-3">
                        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5" class="slider-custom w-24">
                    </div>
                </div>
            </div>

            <div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700 space-y-6">
                <div>
                    <h3 class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-4">Herramientas</h3>
                    <div class="grid grid-cols-1 gap-2">
                        <button id="trimBtn" disabled onclick="trimAudio()" class="text-left px-4 py-2 rounded bg-slate-700 hover:bg-slate-600 text-sm disabled:opacity-30">Recortar Selección</button>
                        <button id="normalizeBtn" disabled onclick="normalizeAudio()" class="text-left px-4 py-2 rounded bg-slate-700 hover:bg-slate-600 text-sm disabled:opacity-30">Normalizar</button>
                        <button id="reverseBtn" disabled onclick="reverseAudio()" class="text-left px-4 py-2 rounded bg-slate-700 hover:bg-slate-600 text-sm disabled:opacity-30">Invertir (Reverse)</button>
                        <button id="muteBtn" disabled onclick="muteSelection()" class="text-left px-4 py-2 rounded bg-slate-700 hover:bg-slate-600 text-sm disabled:opacity-30">Silenciar Selección</button>
                        <button id="echoModalBtn" disabled onclick="openModal('echoModal')" class="text-left px-4 py-2 rounded bg-slate-700 hover:bg-slate-600 text-sm disabled:opacity-30">Eco</button>
                        <button id="reverbSimpleModalBtn" disabled onclick="openModal('reverbSimpleModal')" class="text-left px-4 py-2 rounded bg-indigo-700/50 hover:bg-indigo-600/50 text-sm disabled:opacity-30 border border-indigo-500/30">Reverberación</button>
                        <button id="reverbModalBtn" disabled onclick="openModal('reverbModal')" class="text-left px-4 py-2 rounded bg-blue-700/50 hover:bg-blue-600/50 text-sm disabled:opacity-30 border border-blue-500/30">Reverberación Convolutiva</button>
                    </div>
                </div>
            </div>
        </main>

        <div id="echoModal" class="fixed inset-0 modal-bg hidden flex items-center justify-center z-50">
            <div class="bg-slate-800 w-full max-w-md p-6 rounded-2xl shadow-2xl border border-slate-600 relative">
                <button onclick="closeModal('echoModal')" class="absolute top-4 right-4 text-slate-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
                <h2 class="text-xl mb-2 font-medium">Eco</h2>
                <div class="space-y-6">
                    <div class="space-y-2">
                        <div class="flex justify-between text-xs text-slate-400 uppercase">
                            <span>Retardo</span>
                            <span id="delayVal">0.5s</span>
                        </div>
                        <input type="range" id="echoDelay" min="0.1" max="2.0" step="0.1" value="0.5" class="slider-custom w-full">
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between text-xs text-slate-400 uppercase">
                            <span>Mezcla</span>
                            <span id="echoMixVal">40%</span>
                        </div>
                        <input type="range" id="echoMix" min="0" max="1" step="0.01" value="0.4" class="slider-custom w-full">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="previewEcho()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-medium">Vista Previa</button>
                        <button onclick="applyEffect('echo')" class="flex-[2] bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-medium">Aplicar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="reverbSimpleModal" class="fixed inset-0 modal-bg hidden flex items-center justify-center z-50">
            <div class="bg-slate-800 w-full max-w-md p-6 rounded-2xl shadow-2xl border border-slate-600 relative">
                <button onclick="closeModal('reverbSimpleModal')" class="absolute top-4 right-4 text-slate-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
                <h2 class="text-xl mb-2 font-medium">Reverberación</h2>
                <div class="space-y-6">
                    <div class="space-y-2">
                        <div class="flex justify-between text-xs text-slate-400 uppercase">
                            <span>Pre-retardo</span>
                            <span id="preDelayVal">20ms</span>
                        </div>
                        <input type="range" id="reverbPreDelay" min="0" max="200" step="1" value="20" class="slider-custom w-full">
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between text-xs text-slate-400 uppercase">
                            <span>Tamaño de habitación</span>
                            <span id="roomSizeVal">50%</span>
                        </div>
                        <input type="range" id="reverbRoomSize" min="0" max="1" step="0.01" value="0.5" class="slider-custom w-full">
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between text-xs text-slate-400 uppercase">
                            <span>Decaimiento</span>
                            <span id="decayVal">4.0s</span>
                        </div>
                        <input type="range" id="reverbDecay" min="0.5" max="10.0" step="0.1" value="4.0" class="slider-custom w-full">
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between text-xs text-slate-400 uppercase">
                            <span>Mezcla</span>
                            <span id="mixVal">50%</span>
                        </div>
                        <input type="range" id="reverbSimpleMix" min="0" max="1" step="0.01" value="0.5" class="slider-custom w-full">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="previewAlgorithmicReverb()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-medium">Vista Previa</button>
                        <button onclick="applyEffect('reverb')" class="flex-[2] bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-medium">Aplicar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="reverbModal" class="fixed inset-0 modal-bg hidden flex items-center justify-center z-50">
            <div class="bg-slate-800 w-full max-w-md p-6 rounded-2xl shadow-2xl border border-slate-600 relative">
                <button onclick="closeModal('reverbModal')" class="absolute top-4 right-4 text-slate-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
                <h2 class="text-xl mb-2 font-medium">Reverberación Convolutiva</h2>
                <div class="space-y-4">
                    <div class="border-2 border-dashed border-slate-600 rounded-lg p-8 text-center hover:border-blue-500 cursor-pointer" onclick="document.getElementById('irInput').click()">
                        <input type="file" id="irInput" accept="audio/*" class="hidden">
                        <span id="irFileName" class="text-sm text-slate-400">Seleccionar Archivo IR (MP3, WAV, Etc.)</span>
                    </div>
                    <div class="flex items-center justify-between gap-4">
                        <label class="text-xs text-slate-400 uppercase">Mezcla</label>
                        <input type="range" id="reverbMix" min="0" max="1" step="0.1" value="0.5" class="slider-custom flex-grow">
                    </div>
                    <div class="flex gap-2">
                        <button id="previewConvBtn" disabled onclick="previewConvolutionReverb()" class="flex-1 bg-slate-700 hover:bg-slate-600 disabled:opacity-30 py-3 rounded-xl font-medium">Vista Previa</button>
                        <button id="applyReverbBtn" disabled onclick="applyEffect('convolution')" class="flex-[2] bg-blue-600 hover:bg-blue-500 disabled:opacity-30 py-3 rounded-xl font-medium">Aplicar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="statusMessage" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-blue-600 px-6 py-3 rounded-lg shadow-xl opacity-0 pointer-events-none transition-opacity">
            Estado
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioBuffer = null, irBuffer = null, sourceNode = null, previewNode = null;
        let startOffset = 0, startTime = 0, isPlaying = false;
        let history = [], historyIndex = -1;
        let selection = { start: null, end: null };

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        const canvas = document.getElementById('waveformCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('selectionOverlay');
        const cursor = document.getElementById('playbackCursor');
        const volumeSlider = document.getElementById('volumeSlider');

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { 
            document.getElementById(id).classList.add('hidden'); 
            stopPreview();
        }

        function stopPreview() {
            if (previewNode) {
                try { previewNode.stop(); } catch(e) {}
                previewNode = null;
            }
        }

        function stopPlayback() {
            if (isPlaying) {
                if (sourceNode) {
                    try { sourceNode.stop(); } catch(e) {}
                }
                startOffset += audioCtx.currentTime - startTime;
                if (startOffset >= audioBuffer.duration) startOffset = 0;
                isPlaying = false;
                document.getElementById('playIcon').classList.remove('hidden');
                document.getElementById('pauseIcon').classList.add('hidden');
            }
            stopPreview();
        }

        async function toggleRecording() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const arrayBuffer = await audioBlob.arrayBuffer();
                        const decodedBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                        audioBuffer = decodedBuffer;
                        history = []; historyIndex = -1;
                        saveState();
                        resetEditorState();
                        document.querySelectorAll('button').forEach(b => b.disabled = false);
                        showStatus("Grabación Cargada");
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    updateRecordingUI(true);
                    showStatus("Grabando...");
                } catch (err) {
                    showStatus("Error Al Acceder Al Micrófono");
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                updateRecordingUI(false);
            }
        }

        function updateRecordingUI(recording) {
            const btn = document.getElementById('recordBtn');
            const dot = document.getElementById('recordDot');
            const text = document.getElementById('recordText');
            if (recording) {
                btn.classList.add('bg-slate-900');
                btn.classList.remove('bg-red-600');
                dot.classList.add('recording-pulse', 'bg-red-500');
                text.innerText = "Detener";
            } else {
                btn.classList.remove('bg-slate-900');
                btn.classList.add('bg-red-600');
                dot.classList.remove('recording-pulse', 'bg-red-500');
                dot.classList.add('bg-white');
                text.innerText = "Grabar";
            }
        }

        function saveState() {
            if (!audioBuffer) return;
            const clone = audioCtx.createBuffer(audioBuffer.numberOfChannels, audioBuffer.length, audioBuffer.sampleRate);
            for (let i = 0; i < audioBuffer.numberOfChannels; i++) {
                clone.copyToChannel(new Float32Array(audioBuffer.getChannelData(i)), i);
            }
            history = history.slice(0, historyIndex + 1);
            history.push(clone);
            if (history.length > 20) history.shift();
            else historyIndex++;
            updateHistoryButtons();
        }

        function undo() {
            if (historyIndex > 0) {
                stopPlayback();
                historyIndex--;
                audioBuffer = history[historyIndex];
                resetEditorState();
                updateHistoryButtons();
                showStatus("Deshecho");
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                stopPlayback();
                historyIndex++;
                audioBuffer = history[historyIndex];
                resetEditorState();
                updateHistoryButtons();
                showStatus("Rehecho");
            }
        }

        function updateHistoryButtons() {
            document.getElementById('undoBtn').disabled = historyIndex <= 0;
            document.getElementById('redoBtn').disabled = historyIndex >= history.length - 1;
        }

        document.getElementById('audioInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const arrayBuffer = await file.arrayBuffer();
            audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            history = []; historyIndex = -1;
            saveState();
            resetEditorState();
            document.querySelectorAll('button').forEach(b => b.disabled = false);
        };

        function drawWaveform() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            if (!audioBuffer) return;
            const data = audioBuffer.getChannelData(0);
            const step = Math.ceil(data.length / canvas.width);
            const amp = canvas.height / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#3b82f6';
            for (let i = 0; i < canvas.width; i++) {
                let min = 1.0, max = -1.0;
                for (let j = 0; j < step; j++) {
                    const idx = (i * step) + j;
                    if (idx >= data.length) break;
                    const datum = data[idx];
                    if (datum < min) min = datum;
                    if (datum > max) max = datum;
                }
                ctx.moveTo(i, (1 + min) * amp);
                ctx.lineTo(i, (1 + max) * amp);
            }
            ctx.stroke();
        }

        canvas.onmousedown = (e) => {
            const rect = canvas.getBoundingClientRect();
            selection.start = (e.clientX - rect.left) / canvas.width;
            selection.end = selection.start;
            updateSelectionUI();
        };

        window.onmousemove = (e) => {
            if (selection.start === null || e.buttons !== 1) return;
            const rect = canvas.getBoundingClientRect();
            selection.end = Math.max(0, Math.min(1, (e.clientX - rect.left) / canvas.width));
            updateSelectionUI();
        };

        function updateSelectionUI() {
            if (selection.start === null) return;
            const s = Math.min(selection.start, selection.end);
            const w = Math.abs(selection.end - selection.start);
            overlay.style.display = 'block';
            overlay.style.left = (s * canvas.width) + 'px';
            overlay.style.width = (w * canvas.width) + 'px';
        }

        function getSelectionSamples() {
            if (selection.start === null) return { start: 0, end: audioBuffer.length };
            const s = Math.floor(Math.min(selection.start, selection.end) * audioBuffer.length);
            const e = Math.floor(Math.max(selection.start, selection.end) * audioBuffer.length);
            return { start: s, end: e };
        }

        function buildEchoChain(context, source, dest, delayTime, mix) {
            const dryGain = context.createGain();
            const wetGain = context.createGain();
            const delay = context.createDelay();
            const feedback = context.createGain();
            dryGain.gain.value = 1.0 - mix;
            wetGain.gain.value = mix;
            delay.delayTime.value = delayTime;
            feedback.gain.value = 0.4;
            source.connect(dryGain); dryGain.connect(dest);
            source.connect(delay); delay.connect(feedback); feedback.connect(delay);
            delay.connect(wetGain); wetGain.connect(dest);
        }

        function buildAlgorithmicChain(context, source, dest, decay, mix, roomSize, preDelay) {
            const dryGain = context.createGain();
            const wetGain = context.createGain();
            const outputLimiter = context.createGain();
            const preDelayNode = context.createDelay(0.2);
            preDelayNode.delayTime.value = preDelay / 1000;
            
            dryGain.gain.value = 1.0 - mix;
            wetGain.gain.value = mix;
            outputLimiter.gain.value = 0.35; 

            const scale = 0.05 + (roomSize * 2.0); 
            const baseTimes = [0.0151, 0.0183, 0.0211, 0.0237, 0.0271, 0.0293];
            const combMerger = context.createGain();
            combMerger.gain.value = 1 / baseTimes.length;

            source.connect(preDelayNode);
            baseTimes.forEach((t, idx) => {
                const delay = context.createDelay();
                delay.delayTime.value = t * scale;
                const feedback = context.createGain();
                feedback.gain.value = Math.pow(10, -3 * t * scale / decay);
                const filter = context.createBiquadFilter();
                filter.type = "lowpass";
                filter.frequency.value = 12000 - (idx * 1500);
                
                preDelayNode.connect(filter);
                filter.connect(delay);
                delay.connect(feedback);
                feedback.connect(delay);
                feedback.connect(combMerger);
            });

            const ap1 = context.createBiquadFilter(); ap1.type = "allpass"; ap1.frequency.value = 450;
            const ap2 = context.createBiquadFilter(); ap2.type = "allpass"; ap2.frequency.value = 1600;
            
            combMerger.connect(ap1);
            ap1.connect(ap2);
            ap2.connect(wetGain);
            
            source.connect(dryGain);
            dryGain.connect(dest);
            wetGain.connect(outputLimiter);
            outputLimiter.connect(dest);
        }

        async function applyEffect(type) {
            stopPlayback();
            showStatus("Procesando...");
            const { start, end } = getSelectionSamples();
            const length = end - start;
            if (length <= 0) return;

            const selectionBuffer = audioCtx.createBuffer(audioBuffer.numberOfChannels, length, audioBuffer.sampleRate);
            for (let i = 0; i < audioBuffer.numberOfChannels; i++) {
                selectionBuffer.copyToChannel(audioBuffer.getChannelData(i).slice(start, end), i);
            }

            let tailSeconds = 0;
            if (type === 'echo') tailSeconds = 5;
            if (type === 'reverb') tailSeconds = parseFloat(document.getElementById('reverbDecay').value);
            if (type === 'convolution') tailSeconds = irBuffer ? irBuffer.duration : 5;

            const offline = new OfflineAudioContext(audioBuffer.numberOfChannels, length + (audioBuffer.sampleRate * tailSeconds), audioBuffer.sampleRate);
            const source = offline.createBufferSource();
            source.buffer = selectionBuffer;

            if (type === 'echo') {
                buildEchoChain(offline, source, offline.destination, parseFloat(document.getElementById('echoDelay').value), parseFloat(document.getElementById('echoMix').value));
                closeModal('echoModal');
            } else if (type === 'reverb') {
                buildAlgorithmicChain(offline, source, offline.destination, parseFloat(document.getElementById('reverbDecay').value), parseFloat(document.getElementById('reverbSimpleMix').value), parseFloat(document.getElementById('reverbRoomSize').value), parseFloat(document.getElementById('reverbPreDelay').value));
                closeModal('reverbSimpleModal');
            } else if (type === 'convolution') {
                const mix = parseFloat(document.getElementById('reverbMix').value);
                const conv = offline.createConvolver();
                conv.buffer = irBuffer;
                conv.channelCount = audioBuffer.numberOfChannels;
                conv.channelInterpretation = 'speakers';
                const dry = offline.createGain(); dry.gain.value = 1 - mix;
                const wet = offline.createGain(); wet.gain.value = mix;
                source.connect(dry); dry.connect(offline.destination);
                source.connect(conv); conv.connect(wet); wet.connect(offline.destination);
                closeModal('reverbModal');
            }
            
            source.start();
            const renderedPart = await offline.startRendering();

            const newTotalLength = start + renderedPart.length + (audioBuffer.length - end);
            const finalBuffer = audioCtx.createBuffer(audioBuffer.numberOfChannels, newTotalLength, audioBuffer.sampleRate);
            
            for (let i = 0; i < audioBuffer.numberOfChannels; i++) {
                const originalChannelData = audioBuffer.getChannelData(i);
                const renderedChannelData = renderedPart.getChannelData(i);
                const finalChannelData = finalBuffer.getChannelData(i);
                
                finalChannelData.set(originalChannelData.subarray(0, start), 0);
                finalChannelData.set(renderedChannelData, start);
                finalChannelData.set(originalChannelData.subarray(end), start + renderedChannelData.length);
            }

            audioBuffer = finalBuffer;
            saveState(); 
            resetEditorState();
            showStatus("Efecto Aplicado Con Éxito");
        }

        async function previewEcho() {
            stopPreview();
            const { start, end } = getSelectionSamples();
            previewNode = audioCtx.createBufferSource();
            previewNode.buffer = audioBuffer;
            buildEchoChain(audioCtx, previewNode, audioCtx.destination, parseFloat(document.getElementById('echoDelay').value), parseFloat(document.getElementById('echoMix').value));
            previewNode.start(0, start / audioBuffer.sampleRate, (end - start) / audioBuffer.sampleRate);
        }

        async function previewAlgorithmicReverb() {
            stopPreview();
            const { start, end } = getSelectionSamples();
            previewNode = audioCtx.createBufferSource();
            previewNode.buffer = audioBuffer;
            buildAlgorithmicChain(audioCtx, previewNode, audioCtx.destination, parseFloat(document.getElementById('reverbDecay').value), parseFloat(document.getElementById('reverbSimpleMix').value), parseFloat(document.getElementById('reverbRoomSize').value), parseFloat(document.getElementById('reverbPreDelay').value));
            previewNode.start(0, start / audioBuffer.sampleRate, (end - start) / audioBuffer.sampleRate);
        }

        async function previewConvolutionReverb() {
            stopPreview();
            if (!irBuffer) return;
            const { start, end } = getSelectionSamples();
            const mix = parseFloat(document.getElementById('reverbMix').value);
            previewNode = audioCtx.createBufferSource();
            previewNode.buffer = audioBuffer;
            const conv = audioCtx.createConvolver(); 
            conv.buffer = irBuffer;
            conv.channelCount = audioBuffer.numberOfChannels;
            conv.channelInterpretation = 'speakers';
            const dry = audioCtx.createGain(); dry.gain.value = 1 - mix;
            const wet = audioCtx.createGain(); wet.gain.value = mix;
            previewNode.connect(dry); dry.connect(audioCtx.destination);
            previewNode.connect(conv); conv.connect(wet); wet.connect(audioCtx.destination);
            previewNode.start(0, start / audioBuffer.sampleRate, (end - start) / audioBuffer.sampleRate);
        }

        function trimAudio() {
            if (selection.start === null) return;
            stopPlayback();
            const { start, end } = getSelectionSamples();
            if (start === end) return;
            saveState();
            const nb = audioCtx.createBuffer(audioBuffer.numberOfChannels, end - start, audioBuffer.sampleRate);
            for (let i = 0; i < audioBuffer.numberOfChannels; i++) nb.copyToChannel(audioBuffer.getChannelData(i).slice(start, end), i);
            audioBuffer = nb; resetEditorState();
        }

        function normalizeAudio() {
            stopPlayback();
            const { start, end } = getSelectionSamples();
            saveState();
            let maxPeak = 0;
            for (let i = 0; i < audioBuffer.numberOfChannels; i++) {
                const d = audioBuffer.getChannelData(i);
                for (let j = start; j < end; j++) {
                    const absVal = Math.abs(d[j]);
                    if (absVal > maxPeak) maxPeak = absVal;
                }
            }
            const factor = maxPeak > 0 ? 0.98 / maxPeak : 1;
            for (let i = 0; i < audioBuffer.numberOfChannels; i++) {
                const d = audioBuffer.getChannelData(i);
                for (let j = start; j < end; j++) d[j] *= factor;
            }
            drawWaveform();
        }

        function reverseAudio() {
            stopPlayback();
            const { start, end } = getSelectionSamples();
            saveState();
            for (let i = 0; i < audioBuffer.numberOfChannels; i++) {
                const data = audioBuffer.getChannelData(i);
                data.set(data.slice(start, end).reverse(), start);
            }
            drawWaveform();
        }

        function muteSelection() {
            if (selection.start === null) return;
            stopPlayback();
            const { start, end } = getSelectionSamples();
            saveState();
            for (let i = 0; i < audioBuffer.numberOfChannels; i++) {
                const d = audioBuffer.getChannelData(i);
                for (let j = start; j < end; j++) d[j] = 0;
            }
            drawWaveform();
        }

        function togglePlayback() {
            if (isPlaying) {
                stopPlayback();
            } else {
                stopPreview();
                sourceNode = audioCtx.createBufferSource();
                sourceNode.buffer = audioBuffer;
                const gain = audioCtx.createGain();
                gain.gain.value = volumeSlider.value;
                sourceNode.connect(gain).connect(audioCtx.destination);
                if (startOffset >= audioBuffer.duration) startOffset = 0;
                startTime = audioCtx.currentTime;
                sourceNode.start(0, startOffset);
                isPlaying = true;
                document.getElementById('playIcon').classList.add('hidden');
                document.getElementById('pauseIcon').classList.remove('hidden');
                requestAnimationFrame(updateProgress);
            }
        }

        function updateProgress() {
            if (!isPlaying) return;
            const currentPos = startOffset + (audioCtx.currentTime - startTime);
            if (currentPos >= audioBuffer.duration) {
                isPlaying = false; startOffset = 0; cursor.style.left = "0%";
                document.getElementById('playIcon').classList.remove('hidden');
                document.getElementById('pauseIcon').classList.add('hidden');
                return;
            }
            cursor.style.left = (currentPos / audioBuffer.duration * 100) + "%";
            document.getElementById('currentTime').innerText = currentPos.toFixed(1) + "s";
            requestAnimationFrame(updateProgress);
        }

        function resetEditorState() {
            startOffset = 0; selection = { start: null, end: null };
            overlay.style.display = 'none'; cursor.style.left = "0%";
            document.getElementById('currentTime').innerText = "0.0s";
            drawWaveform();
            document.getElementById('totalTime').innerText = (audioBuffer.duration).toFixed(1) + "s";
        }

        function showStatus(m) {
            const s = document.getElementById('statusMessage');
            s.innerText = m; s.style.opacity = 1;
            setTimeout(() => s.style.opacity = 0, 1500);
        }

        function exportAudio() {
            if (!audioBuffer) return;
            const wavBuffer = bufferToWav(audioBuffer);
            const blob = new Blob([wavBuffer], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url; link.download = 'audio_editado.wav'; link.click();
            URL.revokeObjectURL(url);
        }

        function bufferToWav(abuffer) {
            const numOfChan = abuffer.numberOfChannels,
                  length = abuffer.length * numOfChan * 2 + 44,
                  buffer = new ArrayBuffer(length),
                  view = new DataView(buffer),
                  channels = [];
            let i, sample, offset = 0, pos = 0;
            function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
            function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
            setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
            setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
            setUint32(abuffer.sampleRate); setUint32(abuffer.sampleRate * 2 * numOfChan);
            setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);
            for(i = 0; i < abuffer.numberOfChannels; i++) channels.push(abuffer.getChannelData(i));
            while(pos < length) {
                for(i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF);
                    view.setInt16(pos, sample, true); pos += 2;
                }
                offset++;
            }
            return buffer;
        }

        document.getElementById('irInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            showStatus("Cargando IR...");
            try {
                const arrayBuffer = await file.arrayBuffer();
                irBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                document.getElementById('applyReverbBtn').disabled = false;
                document.getElementById('previewConvBtn').disabled = false;
                document.getElementById('irFileName').innerText = file.name;
                showStatus("Impulso Cargado");
            } catch (err) {
                showStatus("Error Al Decodificar Audio");
                console.error(err);
            }
        };

        document.getElementById('reverbDecay').oninput = (e) => document.getElementById('decayVal').innerText = e.target.value + "s";
        document.getElementById('reverbSimpleMix').oninput = (e) => document.getElementById('mixVal').innerText = Math.round(e.target.value * 100) + "%";
        document.getElementById('reverbRoomSize').oninput = (e) => document.getElementById('roomSizeVal').innerText = Math.round(e.target.value * 100) + "%";
        document.getElementById('reverbPreDelay').oninput = (e) => document.getElementById('preDelayVal').innerText = e.target.value + "ms";
        document.getElementById('echoDelay').oninput = (e) => document.getElementById('delayVal').innerText = e.target.value + "s";
        document.getElementById('echoMix').oninput = (e) => document.getElementById('echoMixVal').innerText = Math.round(e.target.value * 100) + "%";
        
        window.onresize = drawWaveform;
    </script>
</body>
</html>
